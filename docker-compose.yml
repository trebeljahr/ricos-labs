# Production Docker Compose. Coolify auto-detects ${VAR_NAME} syntax
# and creates UI fields for each. Do NOT expose ports here. Coolify's
# Traefik handles external routing.

services:
  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    environment:
      NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ${OPENPANEL_CLIENT_ID:-}
      NEXT_PUBLIC_SENTRY_DSN: ${CLIENT_SENTRY_DSN:-}
      PORT: ${PORT:-6457}
    restart: unless-stopped
